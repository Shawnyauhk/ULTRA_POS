    <script>
      // 強制清除舊版 Service Worker，避免緩存導致 OCR 設定不生效
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
          }
        });
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) caches.delete(name);
          });
        }
      }

      // 開發模式：監聽 Vite 熱更新連線，斷線時自動重載頁面
      var viteCheckInterval = setInterval(function() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', location.href, true);
        xhr.timeout = 5000;
        xhr.onload = function() {
          if (xhr.status >= 400) {
            console.warn('[AutoReload] 伺服器返回錯誤(' + xhr.status + ')，即將重新載入');
            clearInterval(viteCheckInterval);
            location.reload(true);
          }
        };
        xhr.onerror = function() {
          console.warn('[AutoReload] 無法連線到伺服器，即將重新載入');
          clearInterval(viteCheckInterval);
          setTimeout(function() { location.reload(true); }, 1000);
        };
        xhr.send();
      }, 10000); // 每 10 秒檢查一次
    </script>

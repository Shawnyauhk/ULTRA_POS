services:
  - type: web
    name: ultra-pos
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VITE_NVIDIA_NIM_API_KEY
        sync: false
      - key: VITE_NVIDIA_NIM_MODEL
        value: meta/llama-3.2-11b-vision-instruct
      - key: POSPAL_USERNAME
        sync: false
      - key: POSPAL_PASSWORD
        sync: false
      - key: POSPAL_STORE_NAME
        sync: false
